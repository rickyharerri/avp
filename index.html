<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVP — Project Index</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 48px 32px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }

    header p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #888;
      letter-spacing: 0.04em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      text-decoration: none;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      border-color: #444;
    }

    .preview {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: #111;
    }

    .preview iframe {
      width: 1280px;
      height: 900px;
      border: none;
      transform: scale(0.25);
      transform-origin: top left;
      pointer-events: none;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .card-body {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .folder-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .card-body h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: 0.02em;
    }

    .card-body span {
      display: block;
      font-size: 0.78rem;
      color: #666;
      margin-top: 2px;
    }

    .arrow {
      margin-left: auto;
      color: #555;
      font-size: 1rem;
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .arrow {
      color: #aaa;
      transform: translateX(3px);
    }
  </style>
</head>
<body>

  <header>
    <h1>AVP</h1>
    <p>Select a project to preview</p>
  </header>

  <div class="grid">

    <a class="card" target="_blank" href="in/index.html">
      <div class="preview">
        <iframe src="in/index.html" loading="lazy" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
        <div class="preview-overlay"></div>
      </div>
      <div class="card-body">
        <span class="folder-icon">📁</span>
        <div>
          <h2>in</h2>
          <span>in/index.html</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </a>

    <a class="card" target="_blank" href="mockup-1/index.html">
      <div class="preview">
        <iframe src="mockup-1/index.html" loading="lazy" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
        <div class="preview-overlay"></div>
      </div>
      <div class="card-body">
        <span class="folder-icon">📁</span>
        <div>
          <h2>mockup-1</h2>
          <span>mockup-1/index.html</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </a>

    <a class="card" target="_blank" href="mockup-2/index.html">
      <div class="preview">
        <iframe src="mockup-2/index.html" loading="lazy" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
        <div class="preview-overlay"></div>
      </div>
      <div class="card-body">
        <span class="folder-icon">📁</span>
        <div>
          <h2>mockup-2</h2>
          <span>mockup-2/index.html</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </a>

    <a class="card" target="_blank" href="mockup-3/index.html">
      <div class="preview">
        <iframe src="mockup-3/index.html" loading="lazy" scrolling="no" tabindex="-1" aria-hidden="true"></iframe>
        <div class="preview-overlay"></div>
      </div>
      <div class="card-body">
        <span class="folder-icon">📁</span>
        <div>
          <h2>mockup-3</h2>
          <span>mockup-3/index.html</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </a>

  </div>

</body>
</html>
